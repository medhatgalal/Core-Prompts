name: Validate CLI surfaces

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate generated surfaces
        run: python3 scripts/validate-surfaces.py
