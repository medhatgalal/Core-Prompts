# eng-report configuration
# Edit directly or run: eng-report configure
# Run: eng-report sync-authors  — to refresh author lists from Home MCP
# Total reports per run: ~32

drive:
  folder: "@Reference/Engineering-Reports"
  notify:
    chat_space: ""
    email: "scott.parrish@appian.com"

local:
  sync_path: "~/repo/eng-reports"
  window: "1 week ago"

